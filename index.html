<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Файлотека стрима</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0e;
    --bg-elev:#151516;
    --bg-elev-2:#1c1c1e;
    --bg-elev-3:#242426;
    --border:#2a2a2c;
    --border-soft:#1f1f21;
    --text:#f3f3f2;
    --text-dim:#a3a3a6;
    --text-mute:#6c6c6f;
    --white:#ffffff;
    --black:#000000;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --radius-pill:999px;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:840px;
    margin:0 auto;
    padding:0 20px 80px;
  }

  /* ---------- top intro ---------- */
  .intro{
    padding:56px 0 32px;
    border-bottom:1px solid var(--border-soft);
    margin-bottom:28px;
  }

  .intro-label{
    font-size:13px;
    font-weight:600;
    color:var(--text-mute);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0 0 12px;
  }

  .intro h1{
    font-size:32px;
    font-weight:700;
    margin:0 0 14px;
    letter-spacing:-0.02em;
    color:var(--white);
  }

  .intro p{
    font-size:16px;
    line-height:1.6;
    color:var(--text-dim);
    max-width:560px;
    margin:0;
  }

  /* ---------- controls ---------- */
  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }

  .search-field{
    flex:1 1 260px;
    position:relative;
    display:flex;
    align-items:center;
  }

  .search-field svg{
    position:absolute;
    left:16px;
    width:17px;
    height:17px;
    stroke:var(--text-mute);
    pointer-events:none;
  }

  .search-field input{
    width:100%;
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--text);
    font-family:inherit;
    font-size:15px;
    padding:12px 16px 12px 42px;
    border-radius:var(--radius-pill);
    outline:none;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .search-field input::placeholder{color:var(--text-mute);}
  .search-field input:focus{
    border-color:#4a4a4e;
    background:var(--bg-elev-2);
  }

  .date-field{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:var(--radius-pill);
    padding:8px 8px 8px 18px;
  }

  .date-field label{
    font-size:14px;
    color:var(--text-dim);
    white-space:nowrap;
  }

  .date-field input[type="date"]{
    background:var(--bg-elev-2);
    border:1px solid var(--border);
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    padding:6px 10px;
    border-radius:var(--radius-pill);
    outline:none;
    color-scheme:dark;
  }

  .date-field button{
    background:transparent;
    border:none;
    color:var(--text-mute);
    font-size:13px;
    cursor:pointer;
    padding:6px 10px;
    border-radius:var(--radius-pill);
    transition:background 0.15s ease, color 0.15s ease;
  }
  .date-field button:hover{background:var(--bg-elev-3); color:var(--text);}

  /* ---------- meta bar ---------- */
  .meta-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    font-size:13px;
    color:var(--text-mute);
  }

  .sort-toggle{
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:inherit;
    font-size:13px;
    padding:8px 14px;
    border-radius:var(--radius-pill);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .sort-toggle:hover{background:var(--bg-elev-3); color:var(--text);}
  .sort-toggle svg{width:13px; height:13px; stroke:currentColor;}

  /* ---------- file list ---------- */
  .file-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .file-row{
    display:grid;
    grid-template-columns:44px 1fr auto auto;
    align-items:center;
    gap:16px;
    background:var(--bg-elev);
    border:1px solid var(--border-soft);
    border-radius:var(--radius-md);
    padding:12px 14px;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .file-row:hover{
    background:var(--bg-elev-2);
    border-color:var(--border);
  }

  .file-icon{
    width:44px;
    height:44px;
    border-radius:var(--radius-sm);
    background:var(--bg-elev-3);
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:none;
  }
  .file-icon svg{
    width:19px;
    height:19px;
    stroke:var(--text-dim);
    fill:none;
  }

  .file-main{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:3px;
  }

  .file-name{
    font-size:15px;
    font-weight:500;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .file-sub{
    font-size:13px;
    color:var(--text-mute);
    display:flex;
    gap:8px;
    align-items:center;
  }

  .file-sub .dot{
    width:3px;
    height:3px;
    border-radius:50%;
    background:var(--text-mute);
    flex:none;
  }

  .file-date{
    font-size:14px;
    color:var(--text-dim);
    white-space:nowrap;
    text-align:right;
    min-width:96px;
  }

  .download-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    background:var(--white);
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex:none;
    transition:transform 0.1s ease, opacity 0.15s ease;
    text-decoration:none;
  }
  .download-btn:hover{opacity:0.85;}
  .download-btn:active{transform:scale(0.94);}
  .download-btn svg{
    width:16px;
    height:16px;
    stroke:var(--black);
  }

  /* ---------- empty state ---------- */
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-mute);
    display:none;
  }
  .empty-state.show{display:block;}
  .empty-state svg{
    width:32px;
    height:32px;
    stroke:var(--text-mute);
    margin-bottom:14px;
  }
  .empty-state p{
    font-size:15px;
    margin:0;
  }

  @media (max-width:560px){
    .intro{padding:40px 0 24px;}
    .intro h1{font-size:26px;}
    .controls{flex-direction:column;}
    .date-field{justify-content:space-between;}
    .file-row{
      grid-template-columns:36px 1fr auto;
      grid-template-areas:
        "icon main dl"
        "date date date";
      row-gap:8px;
    }
    .file-icon{grid-area:icon; width:36px; height:36px;}
    .file-main{grid-area:main;}
    .download-btn{grid-area:dl;}
    .file-date{grid-area:date; text-align:left; min-width:0;}
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="intro">
    <p class="intro-label">Файлотека</p>
    <h1>Материалы со стрима</h1>
    <p>Здесь лежит всё, чем я пользуюсь в эфире: ресурспак, шейдеры, конфиги и оверлеи. Список обновляется после каждого стрима — новые файлы появляются сверху.</p>
  </div>

  <div class="controls">
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Найти файл по названию…">
    </div>
    <div class="date-field">
      <label for="dateInput">Обновлено не раньше</label>
      <input type="date" id="dateInput">
      <button id="dateClear" type="button">Сбросить</button>
    </div>
  </div>

  <div class="meta-bar">
    <span id="resultCount">— файлов</span>
    <button class="sort-toggle" id="sortToggle" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 12h10M4 6h16M10 18h4"/></svg>
      <span id="sortLabel">Сначала новые</span>
    </button>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <p>Ничего не найдено. Попробуй изменить запрос или дату.</p>
  </div>

</div>

<script>
  /* =========================================================================
     СПИСОК ФАЙЛОВ
     Дополняй вручную под содержимое своей папки: name, ext, size (байты),
     updated (YYYY-MM-DD), href (ссылка/путь к файлу).
     ========================================================================= */
  const FILES = [
    { name: "resourcepack-2026.zip",     ext: "zip", size: 88080384,  updated: "2026-07-20", href: "resourcepack-2026.zip" },
    { name: "shaders-complementary.zip", ext: "zip", size: 222298112, updated: "2026-07-15", href: "shaders-complementary.zip" },
    { name: "modpack-configs.zip",       ext: "zip", size: 4194304,   updated: "2026-07-10", href: "modpack-configs.zip" },
    { name: "overlay-pack.zip",          ext: "zip", size: 18874368,  updated: "2026-07-05", href: "overlay-pack.zip" },
    { name: "crosshair.png",             ext: "png", size: 12288,     updated: "2026-07-01", href: "crosshair.png" },
    { name: "keybinds.txt",              ext: "txt", size: 2048,      updated: "2026-06-28", href: "keybinds.txt" }
  ];

  const ICONS = {
    zip: `<path d="M3 7h18M8 3h8M12 7v14M9 10h.01M9 13h.01M9 16h.01"/><rect x="4" y="7" width="16" height="14" rx="2"/>`,
    png: `<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m21 15-5-5L5 21"/>`,
    jpg: `<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m21 15-5-5L5 21"/>`,
    jpeg:`<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m21 15-5-5L5 21"/>`,
    txt: `<path d="M14 3v5h5"/><path d="M6 3h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M8 13h8M8 17h5"/>`,
    default: `<path d="M14 3v5h5"/><path d="M6 3h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/>`
  };

  const downloadIcon = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>`;

  function iconSVG(ext){
    const path = ICONS[ext] || ICONS.default;
    return `<svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  }

  function formatSize(bytes){
    if(bytes >= 1073741824) return (bytes/1073741824).toFixed(1).replace(/\.0$/,'') + " ГБ";
    if(bytes >= 1048576) return (bytes/1048576).toFixed(1).replace(/\.0$/,'') + " МБ";
    if(bytes >= 1024) return (bytes/1024).toFixed(1).replace(/\.0$/,'') + " КБ";
    return bytes + " Б";
  }

  function formatDate(iso){
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("ru-RU", { day:"2-digit", month:"2-digit", year:"numeric" });
  }

  const searchInput = document.getElementById("searchInput");
  const dateInput = document.getElementById("dateInput");
  const dateClear = document.getElementById("dateClear");
  const sortToggle = document.getElementById("sortToggle");
  const sortLabel = document.getElementById("sortLabel");
  const fileList = document.getElementById("fileList");
  const emptyState = document.getElementById("emptyState");
  const resultCount = document.getElementById("resultCount");

  let sortDesc = true;

  function render(){
    const query = searchInput.value.trim().toLowerCase();
    const minDate = dateInput.value;

    let items = FILES.filter(f => {
      const matchesQuery = !query || f.name.toLowerCase().includes(query);
      const matchesDate = !minDate || f.updated >= minDate;
      return matchesQuery && matchesDate;
    });

    items.sort((a, b) => sortDesc
      ? b.updated.localeCompare(a.updated)
      : a.updated.localeCompare(b.updated));

    fileList.innerHTML = "";

    items.forEach(f => {
      const row = document.createElement("div");
      row.className = "file-row";
      row.innerHTML = `
        <div class="file-icon">${iconSVG(f.ext)}</div>
        <div class="file-main">
          <span class="file-name">${f.name}</span>
          <span class="file-sub">${f.ext.toUpperCase()}<span class="dot"></span>${formatSize(f.size)}</span>
        </div>
        <span class="file-date">${formatDate(f.updated)}</span>
        <a class="download-btn" href="${f.href}" download title="Скачать">${downloadIcon}</a>
      `;
      fileList.appendChild(row);
    });

    emptyState.classList.toggle("show", items.length === 0);
    resultCount.textContent = items.length === 0
      ? "Ничего не найдено"
      : `${items.length} ${pluralFiles(items.length)}`;
  }

  function pluralFiles(n){
    const mod10 = n % 10, mod100 = n % 100;
    if(mod10 === 1 && mod100 !== 11) return "файл";
    if([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return "файла";
    return "файлов";
  }

  searchInput.addEventListener("input", render);
  dateInput.addEventListener("change", render);
  dateClear.addEventListener("click", () => { dateInput.value = ""; render(); });

  sortToggle.addEventListener("click", () => {
    sortDesc = !sortDesc;
    sortLabel.textContent = sortDesc ? "Сначала новые" : "Сначала старые";
    render();
  });

  render();
</script>

</body>
</html>
